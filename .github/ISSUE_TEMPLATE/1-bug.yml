name: "Bug Report"
description: "Bug report form"
labels: ["bug"]
body:
- type: "markdown"
  attributes:
    value: "This form is to report bugs.\nNon-technical users can report bugs on the [Retro Rewind Discord Server](https://discord.gg/RetroRewind) in the bug-report channel aswell."
- type: "markdown"
  attributes:
    value: "### Reporting guidelines\n- Please only report bugs, that you were able to confirm are actually present.\n  - Examples for this are: Confirming it yourself ingame, receiving video/picture evidence etc.\n- Don't use this form for feature suggestions.\n  - Exceptions are when certain user experiences are so misleading, that they negatively affect most of RRs observable player base.\nBug reports not following these guidelines may be closed without explanation."
- type: "textarea"
  attributes:
    label: "Version"
    description: "What game version was this bug originally found on?"
    placeholder: "v6.7"
  validations:
    required: true
- type: "textarea"
  attributes:
    label: "Bug description"
    description: "Describe the bug in greater detail."
  validations:
    required: true
- type: "textarea"
  attributes:
    label: "Reproduction steps"
    description: "Please explain here how to reproduce the bug. If you're encountering a launcher-specific crash and you already resolved the crashdump, you can paste the stacktrace in here instead of uploading a crash.pul below."
  validations:
    required: true
- type: "upload"
  attributes:
    label: "Crashdump (Archive formats only)"
    description: "If this is a launcher-specific crash: Please always request a crash.pul from users and provide it in the issue. The upload needs to be done in an archive format such as ZIP."
  validations:
    required: false
